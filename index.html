<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Compras Família - Permanente</title>
  <style>
    :root { --primary: #0066ff; --refeicao: #ff9800; --alimentacao: #4caf50; --debito: #9c27b0; --danger: #ff1744; --bg: #f0f2f5; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding: 15px; padding-bottom: 160px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    #tela-login, #tela-cadastro, #tela-troca-senha, #app-principal, #painel-adm { display: none; }
    .grid-saldos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .grid-saldos label { font-size: 10px; font-weight: bold; color: #666; display: block; text-align: center; }
    .item-lista { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
    .resumo-fixo { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="tela-login" class="card">
        <h2 style="text-align:center;">🛒 Login Família</h2>
        <input type="text" id="login_user" placeholder="Nome de usuário">
        <input type="password" id="login_pass" placeholder="Senha">
        <button style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-cadastro')">Novo Cadastro</button>
    </div>

    <div id="tela-cadastro" class="card">
        <h3>Novo Cadastro</h3>
        <input type="text" id="cad_user" placeholder="Seu Nome">
        <button style="background: #2e7d32; color: white;" onclick="realizarCadastro()">CADASTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-login')">Voltar</button>
    </div>

    <div id="tela-troca-senha" class="card">
        <h3 style="color:var(--danger)">Troque sua Senha</h3>
        <input type="password" id="nova_senha" placeholder="Nova Senha">
        <input type="password" id="nova_senha_confirma" placeholder="Confirme a Senha">
        <button style="background: var(--refeicao); color: white;" onclick="salvarNovaSenha()">DEFINIR SENHA</button>
    </div>

    <div id="app-principal">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="boas_vindas"></h2>
        <button onclick="logout()" style="width: auto; padding: 5px; font-size: 10px; background: #ccc;">Sair</button>
      </div>

      <div class="card">
        <span style="font-weight: bold; font-size: 13px; display: block; margin-bottom: 8px;">💰 Meus Saldos</span>
        <div class="grid-saldos">
          <div><label>VR</label><input type="number" id="saldo_vr" value="0" oninput="salvarTudo()"></div>
          <div><label>VA</label><input type="number" id="saldo_va" value="0" oninput="salvarTudo()"></div>
          <div><label>DÉB</label><input type="number" id="saldo_deb" value="0" oninput="salvarTudo()"></div>
        </div>
      </div>

      <div class="card">
          <input type="text" id="nome_prod" placeholder="O que está comprando?">
          <input type="number" id="valor_prod" placeholder="Valor R$" step="0.01">
          <button style="background: #2e7d32; color: white;" onclick="adicionarItem()">➕ ADICIONAR ITEM</button>
      </div>
      
      <div id="lista_itens"></div>

      <div class="resumo-fixo">
        SALDO DISPONÍVEL: R$ <span id="res_total">0,00</span>
      </div>
    </div>

  </div>

  <script>
    // CHAVE ÚNICA PARA O NAVEGADOR NUNCA ESQUECER OS DADOS
    const NOME_DO_BANCO = "BANCO_DADOS_COMPRAS_FAMILIA_FINAL";
    const SENHA_INICIAL = "Compras@2026";

    // Tenta ler o que já existe no navegador
    let dados = JSON.parse(localStorage.getItem(NOME_DO_BANCO)) || { usuarios: {}, itens: [] };
    let userAtivo = sessionStorage.getItem('sessao_user');

    window.onload = () => {
        if (userAtivo && dados.usuarios[userAtivo]) {
            if (dados.usuarios[userAtivo].precisaTrocar) abrirTela('tela-troca-senha');
            else iniciarApp();
        } else { abrirTela('tela-login'); }
    };

    function abrirTela(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display='none');
        document.getElementById(id).style.display='block';
    }

    function salvarTudo() {
        if (userAtivo && userAtivo !== "adm") {
            dados.usuarios[userAtivo].saldos = {
                vr: parseFloat(document.getElementById('saldo_vr').value) || 0,
                va: parseFloat(document.getElementById('saldo_va').value) || 0,
                deb: parseFloat(document.getElementById('saldo_deb').value) || 0
            };
        }
        localStorage.setItem(NOME_DO_BANCO, JSON.stringify(dados));
        renderizar();
    }

    function realizarCadastro() {
        const u = document.getElementById('cad_user').value.trim().toLowerCase();
        if(!u || dados.usuarios[u]) return alert("Nome inválido ou já cadastrado!");
        
        dados.usuarios[u] = { 
            senha: SENHA_INICIAL, 
            precisaTrocar: true, 
            saldos: {vr:0, va:0, deb:0} 
        };
        salvarTudo();
        alert("Cadastrado! Use a senha: " + SENHA_INICIAL);
        abrirTela('tela-login');
    }

    function tentarLogin() {
        const u = document.getElementById('login_user').value.trim().toLowerCase();
        const p = document.getElementById('login_pass').value;

        if (dados.usuarios[u] && dados.usuarios[u].senha === p) {
            userAtivo = u;
            sessionStorage.setItem('sessao_user', u);
            if(dados.usuarios[u].precisaTrocar) abrirTela('tela-troca-senha');
            else iniciarApp();
        } else { alert("Usuário ou senha incorretos!"); }
    }

    function salvarNovaSenha() {
        const s1 = document.getElementById('nova_senha').value;
        const s2 = document.getElementById('nova_senha_confirma').value;
        if(s1.length < 4 || s1 !== s2) return alert("Erro nas senhas!");

        dados.usuarios[userAtivo].senha = s1;
        dados.usuarios[userAtivo].precisaTrocar = false;
        salvarTudo();
        iniciarApp();
    }

    function iniciarApp() {
        abrirTela('app-principal');
        document.getElementById('boas_vindas').innerText = "Oi, " + userAtivo;
        const s = dados.usuarios[userAtivo].saldos;
        document.getElementById('saldo_vr').value = s.vr;
        document.getElementById('saldo_va').value = s.va;
        document.getElementById('saldo_deb').value = s.deb;
        renderizar();
    }

    function adicionarItem() {
        const n = document.getElementById('nome_prod').value;
        const v = parseFloat(document.getElementById('valor_prod').value) || 0;
        if(!n) return;
        
        dados.itens.push({ nome: n, preco: v, autor: userAtivo });
        document.getElementById('nome_prod').value = "";
        document.getElementById('valor_prod').value = "";
        salvarTudo();
    }

    function renderizar() {
        const lista = document.getElementById('lista_itens');
        lista.innerHTML = "";
        let totalGasto = 0;
        
        dados.itens.forEach((it, i) => {
            totalGasto += it.preco;
            lista.innerHTML += `<div class="item-lista">
                <span><b>${it.nome}</b> (R$ ${it.preco.toFixed(2)})</span>
                <button onclick="remover(${i})" style="width:auto; background:none; color:red;">X</button>
            </div>`;
        });

        const s = dados.usuarios[userAtivo].saldos;
        const disponivel = (s.vr + s.va + s.deb) - totalGasto;
        document.getElementById('res_total').innerText = disponivel.toFixed(2);
    }

    function remover(i) {
        dados.itens.splice(i, 1);
        salvarTudo();
    }

    function logout() {
        sessionStorage.removeItem('sessao_user');
        location.reload();
    }
  </script>
</body>
</html>
