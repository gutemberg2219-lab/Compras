<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Super Lista Pro + Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0066ff; --success: #00c853; --danger: #ff1744; --bg: #f5f7fa; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; padding: 15px; }
    .container { max-width: 500px; margin: 0 auto; }
    
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .saldo-card { background: #e3f2fd; border-left: 6px solid var(--primary); }
    
    label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .btn-scanner { background: #673ab7; color: white; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; margin-top: 10px; }
    .btn-danger { background: var(--danger); color: white; margin-top: 20px; }

    #reader { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 15px; background: #000; }
    #status_msg { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 10px; display: none; text-align: center; }
    
    .item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    .total-container { background: white; border-radius: 16px; padding: 15px; text-align: center; margin-top: 10px; border: 2px solid #eee; }
  </style>
</head>
<body>

  <div class="container">
    <h1 style="text-align:center; margin-bottom:15px;">🛒 Lista de Compras</h1>

    <div class="card saldo-card">
      <label>💰 Quanto quer gastar hoje?</label>
      <input type="number" id="saldo_limite" step="0.01" inputmode="decimal" placeholder="R$ 0,00" oninput="atualizarCalculos()">
      <div id="status_saldo" style="font-weight:bold; text-align:right;">Restante: R$ 0,00</div>
    </div>

    <div class="card">
      <div id="reader"></div>
      <button class="btn-scanner" id="btnScan" onclick="alternarScanner()">📷 ABRIR CÂMERA / LER CÓDIGO</button>
      
      <hr style="margin: 15px 0; opacity: 0.2;">

      <label>Código de Barras</label>
      <input type="text" id="codigo" placeholder="EAN ou Digite aqui..." oninput="buscaAutomaticaAoDigitar()">
      
      <div id="status_msg"></div>

      <label>Nome do Produto</label>
      <input type="text" id="nome" placeholder="Ex: Feijão Carioca">
      
      <div style="display: flex; gap: 8px;">
        <div style="flex: 2;">
          <label>Preço (R$)</label>
          <input type="number" id="valor" step="0.01" inputmode="decimal" placeholder="0,00">
        </div>
        <div style="flex: 1;">
          <label>Qtd.</label>
          <input type="number" id="quantidade" value="1">
        </div>
      </div>

      <button class="btn-success" onclick="adicionarItem()">➕ ADICIONAR NA LISTA</button>
    </div>

    <div id="lista"></div>

    <div class="total-container">
      <span style="color: #777; font-size: 12px;">TOTAL GERAL</span><br>
      <strong style="font-size: 28px;">R$ <span id="total">0,00</span></strong>
    </div>

    <button class="btn-danger" onclick="limparLista()">🗑️ Limpar Tudo</button>
  </div>

  <script>
    let itens = [];
    let memoriaProdutos = {};
    let scannerHtml5;

    // Iniciar carregando dados
    window.onload = () => {
      if (localStorage.getItem('itens_v6')) itens = JSON.parse(localStorage.getItem('itens_v6'));
      if (localStorage.getItem('saldo_v6')) document.getElementById('saldo_limite').value = localStorage.getItem('saldo_v6');
      if (localStorage.getItem('memo_v6')) memoriaProdutos = JSON.parse(localStorage.getItem('memo_v6'));
      renderizarLista();
    };

    // FUNÇÕES DO SCANNER (CÂMERA)
    function alternarScanner() {
      const btn = document.getElementById('btnScan');
      const readerDiv = document.getElementById('reader');

      if (!scannerHtml5) {
        readerDiv.style.display = 'block';
        btn.innerHTML = "❌ FECHAR CÂMERA";
        btn.style.background = "#555";
        
        scannerHtml5 = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };

        scannerHtml5.start({ facingMode: "environment" }, config, (decodedText) => {
            document.getElementById('codigo').value = decodedText;
            pararScanner();
            tentarBuscar(); // Busca automática após ler
        }).catch(err => {
            alert("Erro na Câmera: Verifique se deu permissão e se está usando HTTPS.");
            pararScanner();
        });
      } else {
        pararScanner();
      }
    }

    function pararScanner() {
      if (scannerHtml5) {
        scannerHtml5.stop().then(() => {
          scannerHtml5 = null;
          document.getElementById('reader').style.display = 'none';
          document.getElementById('btnScan').innerHTML = "📷 ABRIR CÂMERA / LER CÓDIGO";
          document.getElementById('btnScan').style.background = "#673ab7";
        });
      }
    }

    // BUSCA E LÓGICA
    function buscaAutomaticaAoDigitar() {
      const cod = document.getElementById('codigo').value.trim();
      if (memoriaProdutos[cod]) {
        document.getElementById('nome').value = memoriaProdutos[cod];
        msgStatus("Produto já conhecido!", "green");
      }
    }

    async function tentarBuscar() {
      const cod = document.getElementById('codigo').value.trim();
      if (!cod) return;

      if (memoriaProdutos[cod]) {
        document.getElementById('nome').value = memoriaProdutos[cod];
        document.getElementById('valor').focus();
        return;
      }

      msgStatus("Buscando na internet...", "blue");
      try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${cod}.json`);
        const data = await res.json();
        if (data.status === 1) {
          document.getElementById('nome').value = data.product.product_name || "";
          document.getElementById('valor').focus();
          msgStatus("Encontrado!", "green");
        } else {
          msgStatus("Não encontrado. Digite o nome.", "orange");
          document.getElementById('nome').focus();
        }
      } catch (e) {
        msgStatus("Erro na busca.", "red");
      }
    }

    function msgStatus(texto, cor) {
      const st = document.getElementById('status_msg');
      st.style.display = 'block';
      st.innerHTML = texto;
      st.style.color = cor;
    }

    function adicionarItem() {
      const cod = document.getElementById('codigo').value.trim();
      const nome = document.getElementById('nome').value.trim();
      const valor = parseFloat(document.getElementById('valor').value) || 0;
      const qtd = parseFloat(document.getElementById('quantidade').value) || 1;

      if (!nome || valor <= 0) return alert("Preencha Nome e Preço!");

      if (cod) {
        memoriaProdutos[cod] = nome;
        localStorage.setItem('memo_v6', JSON.stringify(memoriaProdutos));
      }

      itens.push({ nome, valor, qtd, subtotal: valor * qtd });
      salvar();
      
      document.getElementById('codigo').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('status_msg').style.display = 'none';
    }

    function salvar() {
      localStorage.setItem('itens_v6', JSON.stringify(itens));
      renderizarLista();
    }

    function renderizarLista() {
      const listaDiv = document.getElementById('lista');
      const saldoInput = document.getElementById('saldo_limite');
      const totalSpan = document.getElementById('total');
      const statusSaldo = document.getElementById('status_saldo');
      
      listaDiv.innerHTML = '';
      let total = 0;

      itens.forEach((item, index) => {
        total += item.subtotal;
        listaDiv.innerHTML += `
          <div class="item">
            <div><strong>${item.nome}</strong><br><small>${item.qtd}x R$ ${item.valor.toFixed(2)}</small></div>
            <div style="text-align:right;">
              <strong>R$ ${item.subtotal.toFixed(2)}</strong><br>
              <span onclick="removerItem(${index})" style="color:red; cursor:pointer; font-size:12px;">Remover</span>
            </div>
          </div>`;
      });

      totalSpan.innerText = total.toFixed(2);
      const saldo = parseFloat(saldoInput.value) || 0;
      const resta = saldo - total;
      statusSaldo.innerHTML = "Restante: R$ " + resta.toFixed(2);
      statusSaldo.style.color = resta < 0 ? "red" : "green";
      localStorage.setItem('saldo_v6', saldo);
    }

    function removerItem(index) {
      itens.splice(index, 1);
      salvar();
    }

    function atualizarCalculos() { renderizarLista(); }

    function limparLista() {
      if (confirm("Limpar lista?")) {
        itens = [];
        salvar();
      }
    }
  </script>
</body>
</html>
