<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Compras do Mês - Família Pro</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0066ff; --refeicao: #ff9800; --alimentacao: #4caf50; --debito: #9c27b0; --danger: #ff1744; --bg: #f0f2f5; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding: 15px; padding-bottom: 160px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    
    #tela-login, #tela-cadastro, #tela-troca-senha, #app-principal { display: none; }
    .btn-save { background: #00c853; color: white; }
    .item-lista { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
    .resumo-fixo { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; box-shadow: 0 -5 -15px rgba(0,0,0,0.1); z-index: 100; }
    .total-disponivel-barra { text-align: center; border-bottom: 1px solid #eee; margin-bottom: 8px; padding-bottom: 5px; font-weight: 800; }
    .colunas-resumo { display: flex; justify-content: space-around; }
    .resumo-box { text-align: center; font-size: 10px; font-weight: bold; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 15px; background: #000; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="tela-login" class="card">
        <h2 style="text-align:center;">🛒 Compras Família</h2>
        <input type="text" id="login_user" placeholder="Seu Nome">
        <input type="password" id="login_pass" placeholder="Senha">
        <button style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
        <button style="background:none; color:var(--primary); text-decoration:underline;" onclick="abrirTela('tela-cadastro')">Novo Cadastro</button>
    </div>

    <div id="tela-cadastro" class="card">
        <h3>Cadastro Familiar</h3>
        <p style="font-size:11px; margin-bottom:10px;">Senha inicial: <b>Compras@2026</b></p>
        <input type="text" id="cad_user" placeholder="Nome do Integrante">
        <button style="background: #2e7d32; color: white;" onclick="realizarCadastro()">CADASTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-login')">Voltar</button>
    </div>

    <div id="tela-troca-senha" class="card">
        <h3 style="color:var(--danger)">Troque sua Senha</h3>
        <input type="password" id="nova_senha" placeholder="Nova Senha">
        <input type="password" id="nova_senha_confirma" placeholder="Confirme a Senha">
        <button style="background: var(--debito); color: white;" onclick="salvarNovaSenha()">DEFINIR SENHA</button>
    </div>

    <div id="app-principal">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="boas_vindas"></h2>
        <button onclick="logout()" style="width: auto; padding: 5px; font-size: 12px;">Sair</button>
      </div>

      <div class="card" style="background: #e3f2fd;">
        <label>🏪 Supermercado</label>
        <input type="text" id="mercado_atual" placeholder="Onde você está?" oninput="localStorage.setItem('mercado_v13', this.value)">
      </div>

      <div class="card">
        <div id="reader"></div>
        <button style="background: #673ab7; color: white;" onclick="alternarScanner()">📷 ESCANEAR PRODUTO</button>
        <input type="text" id="nome_prod" placeholder="O que está comprando?">
        <div style="display: flex; gap: 5px;">
            <input type="number" id="valor_prod" placeholder="Valor R$" step="0.01" style="flex:1">
            <select id="mod_prod" style="flex:1">
                <option value="refeicao">VR</option>
                <option value="alimentacao">VA</option>
                <option value="debito">DÉBITO</option>
            </select>
        </div>
        <button style="background: #2e7d32; color: white;" onclick="adicionarItem()">➕ ADICIONAR À LISTA</button>
      </div>

      <div id="lista_itens"></div>
      
      <button class="btn-save" onclick="finalizarESalvar()">💾 FINALIZAR E EXPORTAR (TXT)</button>
      <button style="background: #f44336; color: white; font-size: 12px;" onclick="limparLista()">🗑️ Limpar Lista Atual</button>
      
      <div class="resumo-fixo">
        <div class="total-disponivel-barra">SALDO DISPONÍVEL: R$ <span id="res_total_disp">0,00</span></div>
        <div class="colunas-resumo">
            <div class="resumo-box" style="color:var(--refeicao)">VR<br><span id="res_vr">0,00</span></div>
            <div class="resumo-box" style="color:var(--alimentacao)">VA<br><span id="res_va">0,00</span></div>
            <div class="resumo-box" style="color:var(--debito)">DÉB<br><span id="res_deb">0,00</span></div>
            <div class="resumo-box" style="border-left:1px solid #ddd; padding-left:5px;">Gasto<br><span id="res_gasto">0,00</span></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SENHA_PADRAO = "Compras@2026";
    let usuarioLogado = null;
    let usuarios = JSON.parse(localStorage.getItem('users_v13')) || {};
    let itens = JSON.parse(localStorage.getItem('itens_v13')) || [];

    // Lógica de Telas e Login
    window.onload = () => {
        const sessao = sessionStorage.getItem('user_ativo');
        if (sessao) { usuarioLogado = sessao; verificarStatusSenha(); } 
        else { abrirTela('tela-login'); }
    };

    function abrirTela(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function realizarCadastro() {
        const u = document.getElementById('cad_user').value.trim();
        if(!u) return;
        usuarios[u] = { senha: SENHA_PADRAO, precisaTrocar: true };
        localStorage.setItem('users_v13', JSON.stringify(usuarios));
        alert("Cadastrado! Use a senha padrão.");
        abrirTela('tela-login');
    }

    function tentarLogin() {
        const u = document.getElementById('login_user').value;
        const p = document.getElementById('login_pass').value;
        if(usuarios[u] && usuarios[u].senha === p) {
            usuarioLogado = u;
            sessionStorage.setItem('user_ativo', u);
            verificarStatusSenha();
        } else { alert("Erro de login!"); }
    }

    function verificarStatusSenha() {
        if(usuarios[usuarioLogado].precisaTrocar) abrirTela('tela-troca-senha');
        else iniciarApp();
    }

    function salvarNovaSenha() {
        const s = document.getElementById('nova_senha').value;
        if(s === SENHA_PADRAO || s.length < 4) return alert("Senha inválida!");
        usuarios[usuarioLogado].senha = s;
        usuarios[usuarioLogado].precisaTrocar = false;
        localStorage.setItem('users_v13', JSON.stringify(usuarios));
        iniciarApp();
    }

    function iniciarApp() {
        abrirTela('app-principal');
        document.getElementById('boas_vindas').innerText = "Oi, " + usuarioLogado;
        document.getElementById('mercado_atual').value = localStorage.getItem('mercado_v13') || "";
        renderizarLista();
    }

    function logout() { sessionStorage.removeItem('user_ativo'); location.reload(); }

    // Lógica das Compras
    function adicionarItem() {
        const n = document.getElementById('nome_prod').value;
        const v = parseFloat(document.getElementById('valor_prod').value) || 0;
        const m = document.getElementById('mod_prod').value;
        const loja = document.getElementById('mercado_atual').value || "Loja Geral";
        if(!n || v <= 0) return;
        
        itens.push({ n, v, m, loja, user: usuarioLogado, data: new Date().toLocaleString() });
        localStorage.setItem('itens_v13', JSON.stringify(itens));
        document.getElementById('nome_prod').value = "";
        document.getElementById('valor_prod').value = "";
        renderizarLista();
    }

    function renderizarLista() {
        const lista = document.getElementById('lista_itens');
        lista.innerHTML = "";
        let g = { refeicao: 0, alimentacao: 0, debito: 0 };
        itens.forEach((it, i) => {
            g[it.m] += it.v;
            lista.innerHTML += `<div class="item-lista" style="border-left-color:var(--${it.m})">
                <div><b>${it.n}</b><br><small>${it.user} | ${it.m}</small></div>
                <div style="text-align:right">R$ ${it.v.toFixed(2)}<br><span onclick="remover(${i})" style="color:red; font-size:10px;">Remover</span></div>
            </div>`;
        });
        const totalGasto = g.refeicao + g.alimentacao + g.debito;
        document.getElementById('res_gasto').innerText = totalGasto.toFixed(2);
        document.getElementById('res_total_disp').innerText = (3000 - totalGasto).toFixed(2); // Exemplo de saldo base 3000
    }

    function remover(i) { itens.splice(i, 1); localStorage.setItem('itens_v13', JSON.stringify(itens)); renderizarLista(); }

    // FUNÇÃO PARA SALVAR E EXPORTAR
    function finalizarESalvar() {
        if(itens.length === 0) return alert("Lista vazia!");
        
        const mercado = document.getElementById('mercado_atual').value || "Mercado";
        let conteudo = `🛒 RELATÓRIO DE COMPRAS - ${mercado}\n`;
        conteudo += `Data: ${new Date().toLocaleDateString()}\n`;
        conteudo += `--------------------------------\n`;
        
        let total = 0;
        itens.forEach(it => {
            conteudo += `[${it.m.toUpperCase()}] ${it.n} - R$ ${it.v.toFixed(2)} (por ${it.user})\n`;
            total += it.v;
        });
        
        conteudo += `--------------------------------\n`;
        conteudo += `TOTAL GASTO: R$ ${total.toFixed(2)}\n`;
        conteudo += `--------------------------------\n`;
        conteudo += `Gerado pelo App Compras Família`;

        // Criar download do arquivo .txt
        const blob = new Blob([conteudo], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `compras_${mercado}_${new Date().toLocaleDateString()}.txt`;
        link.click();
        
        alert("Arquivo de compras baixado com sucesso!");
    }

    function limparLista() { if(confirm("Deseja apagar a lista atual?")) { itens = []; localStorage.setItem('itens_v13', "[]"); renderizarLista(); } }
  </script>
</body>
</html>
