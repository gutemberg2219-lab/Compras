<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Super Lista de Compras</title>
  <style>
    :root { 
      --primary: #0066ff; 
      --success: #00c853; 
      --danger: #ff1744; 
      --bg: #f5f7fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #e4e9f2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    .container { max-width: 620px; margin: 0 auto; }
    h1 { font-size: 28px; text-align: center; margin-bottom: 20px; color: #1a1a1a; }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    /* ESTILO DO CARD DE SALDO */
    .saldo-card {
      background: #e3f2fd;
      border-left: 6px solid var(--primary);
    }

    label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-bottom: 5px; }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    input:focus {
      border-color: var(--primary);
      outline: none;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 5px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; margin-top: 20px; }

    #status_saldo {
      font-size: 20px;
      font-weight: bold;
      text-align: right;
      margin-top: 5px;
      color: #333;
    }

    .item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    }

    .total-container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .total-valor { font-size: 32px; font-weight: 800; }
  </style>
</head>
<body>

  <div class="container">
    <h1>🛒 Lista de Compras</h1>

    <div class="card saldo-card">
      <label>💰 Quanto você pode gastar? (R$)</label>
      <input type="number" id="saldo_limite" step="0.01" inputmode="decimal" placeholder="Ex: 200,00" oninput="atualizarCalculos()">
      <div id="status_saldo">Restante: R$ 0,00</div>
    </div>

    <div class="card">
      <label>Código de Barras (Opcional)</label>
      <input type="text" id="codigo" placeholder="Digite ou cole o código">
      <button class="btn-primary" onclick="tentarBuscar()">🔍 Buscar Produto</button>

      <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

      <label>Nome do Produto</label>
      <input type="text" id="nome" placeholder="Ex: Arroz 5kg">
      
      <div style="display: flex; gap: 10px;">
        <div style="flex: 2;">
          <label>Preço (R$)</label>
          <input type="number" id="valor" step="0.01" inputmode="decimal" placeholder="0,00">
        </div>
        <div style="flex: 1;">
          <label>Qtd.</label>
          <input type="number" id="quantidade" value="1">
        </div>
      </div>

      <button class="btn-success" onclick="adicionarItem()">➕ Adicionar à Lista</button>
    </div>

    <h2 style="margin: 20px 0 10px 5px;">Itens na lista</h2>
    <div id="lista"></div>

    <div class="total-container">
      <div style="color: #777; text-transform: uppercase; font-size: 12px;">Total acumulado</div>
      <div class="total-valor">R$ <span id="total">0,00</span></div>
    </div>

    <button class="btn-danger" onclick="limparLista()">🗑️ Limpar Lista</button>
  </div>

  <script>
    let itens = [];

    // Carregar dados salvos ao abrir
    window.onload = () => {
      const listaSalva = localStorage.getItem('itens_compras');
      const saldoSalvo = localStorage.getItem('saldo_compras');
      if (listaSalva) itens = JSON.parse(listaSalva);
      if (saldoSalvo) document.getElementById('saldo_limite').value = saldoSalvo;
      renderizarLista();
    };

    async function tentarBuscar() {
      const codigo = document.getElementById('codigo').value.trim();
      if (!codigo) return alert("Digite um código!");
      
      try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${codigo}.json`);
        const data = await res.json();
        if (data.status === 1) {
          document.getElementById('nome').value = data.product.product_name || "";
          document.getElementById('valor').focus();
        } else {
          alert("Produto não encontrado na base internacional.");
        }
      } catch (e) {
        alert("Erro na busca.");
      }
    }

    function adicionarItem() {
      const nome = document.getElementById('nome').value.trim();
      const valor = parseFloat(document.getElementById('valor').value) || 0;
      const qtd = parseFloat(document.getElementById('quantidade').value) || 1;

      if (!nome || valor <= 0) return alert("Preencha os dados do produto!");

      itens.push({ nome, valor, qtd, subtotal: valor * qtd });
      salvar();
      
      // Limpar campos
      document.getElementById('nome').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('quantidade').value = '1';
      document.getElementById('codigo').value = '';
    }

    function removerItem(index) {
      itens.splice(index, 1);
      salvar();
    }

    function atualizarCalculos() {
      localStorage.setItem('saldo_compras', document.getElementById('saldo_limite').value);
      renderizarLista();
    }

    function salvar() {
      localStorage.setItem('itens_compras', JSON.stringify(itens));
      renderizarLista();
    }

    function renderizarLista() {
      const container = document.getElementById('lista');
      const totalSpan = document.getElementById('total');
      const statusSaldo = document.getElementById('status_saldo');
      const saldoInput = document.getElementById('saldo_limite');
      
      container.innerHTML = '';
      let totalGeral = 0;

      itens.forEach((item, index) => {
        totalGeral += item.subtotal;
        container.innerHTML += `
          <div class="item">
            <div>
              <strong>${item.nome}</strong><br>
              <small>${item.qtd}x R$ ${item.valor.toFixed(2)}</small>
            </div>
            <div style="text-align:right;">
              <strong>R$ ${item.subtotal.toFixed(2)}</strong><br>
              <span onclick="removerItem(${index})" style="color:red; cursor:pointer; font-size:12px;">Remover</span>
            </div>
          </div>`;
      });

      totalSpan.textContent = totalGeral.toFixed(2);

      // Lógica do Saldo
      const saldoMax = parseFloat(saldoInput.value) || 0;
      if (saldoMax > 0) {
        const restante = saldoMax - totalGeral;
        statusSaldo.innerHTML = `Restante: R$ ${restante.toFixed(2)}`;
        statusSaldo.style.color = restante < 0 ? "red" : "green";
      } else {
        statusSaldo.innerHTML = "Restante: R$ 0,00";
        statusSaldo.style.color = "#333";
      }
    }

    function limparLista() {
      if (confirm("Apagar tudo?")) {
        itens = [];
        salvar();
      }
    }
  </script>
</body>
</html>
