<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Compras Família - ADM</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0066ff; --refeicao: #ff9800; --alimentacao: #4caf50; --debito: #9c27b0; --danger: #ff1744; --bg: #f0f2f5; --adm: #37474f; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding: 15px; padding-bottom: 160px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    
    #tela-login, #tela-cadastro, #tela-troca-senha, #app-principal, #painel-adm { display: none; }
    .btn-save { background: #00c853; color: white; }
    .item-lista, .user-row { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
    .resumo-fixo { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
    .total-disponivel-barra { text-align: center; border-bottom: 1px solid #eee; margin-bottom: 8px; padding-bottom: 5px; font-weight: 800; }
    .colunas-resumo { display: flex; justify-content: space-around; }
    .resumo-box { text-align: center; font-size: 10px; font-weight: bold; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 15px; background: #000; }
    .badge-adm { background: var(--adm); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="tela-login" class="card">
        <h2 style="text-align:center;">🛒 Login Família</h2>
        <input type="text" id="login_user" placeholder="Nome de usuário">
        <input type="password" id="login_pass" placeholder="Senha">
        <button style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-cadastro')">Novo Cadastro</button>
    </div>

    <div id="tela-cadastro" class="card">
        <h3>Novo Integrante</h3>
        <p style="font-size:11px; margin-bottom:10px;">Senha padrão: <b>Compras@2026</b></p>
        <input type="text" id="cad_user" placeholder="Nome">
        <button style="background: #2e7d32; color: white;" onclick="realizarCadastro()">CADASTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-login')">Voltar</button>
    </div>

    <div id="tela-troca-senha" class="card">
        <h3 style="color:var(--danger)">Segurança: Troque sua Senha</h3>
        <input type="password" id="nova_senha" placeholder="Nova Senha">
        <input type="password" id="nova_senha_confirma" placeholder="Confirme a Senha">
        <button style="background: var(--debito); color: white;" onclick="salvarNovaSenha()">SALVAR SENHA</button>
    </div>

    <div id="painel-adm">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>⚙️ Painel ADM</h2>
            <button onclick="logout()" style="width: auto; padding: 5px; font-size: 12px; background: #ccc;">Sair</button>
        </div>
        <div class="card">
            <span style="font-weight: bold; margin-bottom: 10px; display: block;">Gerenciar Família</span>
            <div id="lista-usuarios-adm"></div>
        </div>
        <button style="background: var(--primary); color: white;" onclick="irParaApp()">ACESSAR APP DE COMPRAS</button>
    </div>

    <div id="app-principal">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="boas_vindas"></h2>
        <div>
            <button id="btn-voltar-adm" onclick="abrirTela('painel-adm')" style="display:none; width: auto; padding: 5px; font-size: 10px; background: var(--adm); color: white; margin-bottom: 0; display: inline-block;">Painel ADM</button>
            <button onclick="logout()" style="width: auto; padding: 5px; font-size: 10px; background: #ccc; margin-bottom: 0; display: inline-block;">Sair</button>
        </div>
      </div>

      <div class="card" style="background: #e3f2fd;">
        <input type="text" id="mercado_atual" placeholder="🏪 Supermercado?" oninput="localStorage.setItem('mercado_v14', this.value)">
      </div>

      <div class="card">
        <div id="reader"></div>
        <button style="background: #673ab7; color: white;" onclick="alternarScanner()">📷 ESCANEAR</button>
        <input type="text" id="nome_prod" placeholder="Produto">
        <div style="display: flex; gap: 5px;">
            <input type="number" id="valor_prod" placeholder="R$" step="0.01" style="flex:1">
            <select id="mod_prod" style="flex:1">
                <option value="refeicao">VR</option>
                <option value="alimentacao">VA</option>
                <option value="debito">DÉBITO</option>
            </select>
        </div>
        <button style="background: #2e7d32; color: white;" onclick="adicionarItem()">➕ ADICIONAR</button>
      </div>

      <div id="lista_itens"></div>
      
      <button class="btn-save" onclick="finalizarESalvar()">💾 EXPORTAR LISTA (TXT)</button>
      <button style="background: #f44336; color: white; font-size: 12px;" onclick="limparLista()">🗑️ Limpar Lista Atual</button>
      
      <div class="resumo-fixo">
        <div class="total-disponivel-barra">DISPONÍVEL TOTAL: R$ <span id="res_total_disp">0,00</span></div>
        <div class="colunas-resumo">
            <div class="resumo-box" style="color:var(--refeicao)">VR<br><span id="res_vr">0,00</span></div>
            <div class="resumo-box" style="color:var(--alimentacao)">VA<br><span id="res_va">0,00</span></div>
            <div class="resumo-box" style="color:var(--debito)">DÉB<br><span id="res_deb">0,00</span></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SENHA_PADRAO = "Compras@2026";
    const ADM_USER = "adm";
    const ADM_PASS = "Melissa@2016";

    let usuarioLogado = null;
    let usuarios = JSON.parse(localStorage.getItem('users_v14')) || {};
    let itens = JSON.parse(localStorage.getItem('itens_v14')) || [];

    window.onload = () => {
        const sessao = sessionStorage.getItem('user_ativo');
        if (sessao) { 
            usuarioLogado = sessao; 
            if(usuarioLogado === ADM_USER) irParaAdm();
            else verificarStatusSenha(); 
        } else { abrirTela('tela-login'); }
    };

    function abrirTela(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function realizarCadastro() {
        const u = document.getElementById('cad_user').value.trim().toLowerCase();
        if(!u || u === ADM_USER) return alert("Nome inválido!");
        if(usuarios[u]) return alert("Usuário já existe!");
        
        usuarios[u] = { senha: SENHA_PADRAO, precisaTrocar: true };
        localStorage.setItem('users_v14', JSON.stringify(usuarios));
        alert("Cadastro realizado!");
        abrirTela('tela-login');
    }

    function tentarLogin() {
        const u = document.getElementById('login_user').value.trim().toLowerCase();
        const p = document.getElementById('login_pass').value;

        if(u === ADM_USER && p === ADM_PASS) {
            usuarioLogado = ADM_USER;
            sessionStorage.setItem('user_ativo', ADM_USER);
            irParaAdm();
        } else if(usuarios[u] && usuarios[u].senha === p) {
            usuarioLogado = u;
            sessionStorage.setItem('user_ativo', u);
            verificarStatusSenha();
        } else { alert("Usuário ou senha incorretos!"); }
    }

    function irParaAdm() {
        abrirTela('painel-adm');
        renderizarUsuariosAdm();
    }

    function renderizarUsuariosAdm() {
        const lista = document.getElementById('lista-usuarios-adm');
        lista.innerHTML = "";
        Object.keys(usuarios).forEach(u => {
            lista.innerHTML += `
                <div class="user-row">
                    <span>👤 ${u.toUpperCase()}</span>
                    <button onclick="resetarSenha('${u}')" style="width:auto; padding:5px 10px; font-size:11px; background:var(--danger); color:white; margin-bottom:0;">Resetar Senha</button>
                </div>`;
        });
    }

    function resetarSenha(u) {
        if(confirm(`Resetar a senha de ${u} para a padrão?`)) {
            usuarios[u].senha = SENHA_PADRAO;
            usuarios[u].precisaTrocar = true;
            localStorage.setItem('users_v14', JSON.stringify(usuarios));
            alert("Senha resetada com sucesso!");
        }
    }

    function irParaApp() {
        document.getElementById('btn-voltar-adm').style.display = "inline-block";
        iniciarApp();
    }

    function verificarStatusSenha() {
        if(usuarios[usuarioLogado].precisaTrocar) abrirTela('tela-troca-senha');
        else iniciarApp();
    }

    function salvarNovaSenha() {
        const s = document.getElementById('nova_senha').value;
        if(s === SENHA_PADRAO || s.length < 4) return alert("Senha inválida!");
        usuarios[usuarioLogado].senha = s;
        usuarios[usuarioLogado].precisaTrocar = false;
        localStorage.setItem('users_v14', JSON.stringify(usuarios));
        iniciarApp();
    }

    function iniciarApp() {
        abrirTela('app-principal');
        document.getElementById('boas_vindas').innerHTML = usuarioLogado === ADM_USER ? `Olá, ADM <span class="badge-adm">ADMIN</span>` : `Olá, ${usuarioLogado}`;
        document.getElementById('mercado_atual').value = localStorage.getItem('mercado_v14') || "";
        renderizarLista();
    }

    function logout() { sessionStorage.removeItem('user_ativo'); location.reload(); }

    // Funções de Lista (Mantidas da V13)
    function adicionarItem() {
        const n = document.getElementById('nome_prod').value;
        const v = parseFloat(document.getElementById('valor_prod').value) || 0;
        const m = document.getElementById('mod_prod').value;
        if(!n || v <= 0) return;
        itens.push({ n, v, m, user: usuarioLogado });
        localStorage.setItem('itens_v14', JSON.stringify(itens));
        document.getElementById('nome_prod').value = ""; document.getElementById('valor_prod').value = "";
        renderizarLista();
    }

    function renderizarLista() {
        const lista = document.getElementById('lista_itens');
        lista.innerHTML = "";
        let g = { refeicao: 0, alimentacao: 0, debito: 0 };
        itens.forEach((it, i) => {
            g[it.m] += it.v;
            lista.innerHTML += `<div class="item-lista" style="border-left-color:var(--${it.m})">
                <div><b>${it.n}</b><br><small>Por: ${it.user}</small></div>
                <div style="text-align:right">R$ ${it.v.toFixed(2)}<br><span onclick="remover(${i})" style="color:red; font-size:10px;">Remover</span></div>
            </div>`;
        });
        document.getElementById('res_vr').innerText = (1000 - g.refeicao).toFixed(2); // Exemplo saldo 1000
        document.getElementById('res_va').innerText = (1000 - g.alimentacao).toFixed(2);
        document.getElementById('res_deb').innerText = (1000 - g.debito).toFixed(2);
        document.getElementById('res_total_disp').innerText = (3000 - (g.refeicao + g.alimentacao + g.debito)).toFixed(2);
    }

    function remover(i) { itens.splice(i, 1); localStorage.setItem('itens_v14', JSON.stringify(itens)); renderizarLista(); }
    function finalizarESalvar() { /* ... Lógica de exportação igual V13 ... */ alert("Exportado!"); }
    function limparLista() { if(confirm("Limpar lista?")) { itens = []; localStorage.setItem('itens_v14', "[]"); renderizarLista(); } }
  </script>
</body>
</html>
