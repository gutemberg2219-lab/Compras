<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Compras Família - Permanente</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0066ff; --refeicao: #ff9800; --alimentacao: #4caf50; --debito: #9c27b0; --danger: #ff1744; --bg: #f0f2f5; --adm: #37474f; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding: 15px; padding-bottom: 160px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    #tela-login, #tela-cadastro, #app-principal, #painel-adm { display: none; }
    .grid-saldos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .grid-saldos label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 2px; }
    .item-lista { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
    .resumo-fixo { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="tela-login" class="card">
        <h2 style="text-align:center;">🛒 Login Família</h2>
        <input type="text" id="login_user" placeholder="Nome de usuário">
        <input type="password" id="login_pass" placeholder="Senha">
        <button style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-cadastro')">Novo Cadastro</button>
    </div>

    <div id="tela-cadastro" class="card">
        <h3>Novo Integrante</h3>
        <input type="text" id="cad_user" placeholder="Nome">
        <button style="background: #2e7d32; color: white;" onclick="realizarCadastro()">CADASTRAR</button>
        <button style="background:none; color:var(--primary);" onclick="abrirTela('tela-login')">Voltar</button>
    </div>

    <div id="painel-adm">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>⚙️ Painel ADM</h2>
            <button onclick="logout()" style="width: auto; padding: 5px; background: #ccc;">Sair</button>
        </div>
        <div class="card" id="lista-usuarios-adm"></div>
        <button style="background: var(--primary); color: white;" onclick="iniciarApp()">IR PARA COMPRAS</button>
    </div>

    <div id="app-principal">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="boas_vindas"></h2>
        <button onclick="logout()" style="width: auto; padding: 5px; font-size: 10px; background: #ccc;">Sair</button>
      </div>

      <div class="card">
        <span style="font-weight: bold; margin-bottom: 8px; display: block; font-size: 13px;">💰 Meus Saldos</span>
        <div class="grid-saldos">
          <div><label>VR</label><input type="number" id="saldo_vr" placeholder="0" oninput="salvarDados()"></div>
          <div><label>VA</label><input type="number" id="saldo_va" placeholder="0" oninput="salvarDados()"></div>
          <div><label>DÉB</label><input type="number" id="saldo_deb" placeholder="0" oninput="salvarDados()"></div>
        </div>
      </div>

      <div class="card"><input type="text" id="nome_prod" placeholder="Produto"><button style="background: #2e7d32; color: white;" onclick="adicionarItem()">➕ ADICIONAR</button></div>
      <div id="lista_itens"></div>

      <div class="resumo-fixo"><div style="text-align:center; font-weight:800;">DISPONÍVEL: R$ <span id="res_total">0,00</span></div></div>
    </div>

  </div>

  <script>
    const MASTER_KEY = "FAMILIA_MASTER_DATA";
    const ADM_USER = "adm";
    const ADM_PASS = "Melissa@2016";

    // Carrega o banco de dados ou cria um novo se não existir
    let db = JSON.parse(localStorage.getItem(MASTER_KEY)) || { usuarios: {}, itens: [] };
    let usuarioLogado = sessionStorage.getItem('user_ativo');

    window.onload = () => {
        if (usuarioLogado) {
            usuarioLogado === ADM_USER ? irParaAdm() : iniciarApp();
        } else {
            abrirTela('tela-login');
        }
    };

    function salvarDados() {
        if (usuarioLogado !== ADM_USER) {
            db.usuarios[usuarioLogado].saldos = {
                vr: parseFloat(document.getElementById('saldo_vr').value) || 0,
                va: parseFloat(document.getElementById('saldo_va').value) || 0,
                deb: parseFloat(document.getElementById('saldo_deb').value) || 0
            };
        }
        localStorage.setItem(MASTER_KEY, JSON.stringify(db));
        renderizar();
    }

    function tentarLogin() {
        const u = document.getElementById('login_user').value.trim().toLowerCase();
        const p = document.getElementById('login_pass').value;

        if (u === ADM_USER && p === ADM_PASS) {
            usuarioLogado = ADM_USER;
            sessionStorage.setItem('user_ativo', ADM_USER);
            irParaAdm();
        } else if (db.usuarios[u] && db.usuarios[u].senha === p) {
            usuarioLogado = u;
            sessionStorage.setItem('user_ativo', u);
            iniciarApp();
        } else { alert("Usuário ou senha inválidos!"); }
    }

    function realizarCadastro() {
        const u = document.getElementById('cad_user').value.trim().toLowerCase();
        if(!u || db.usuarios[u] || u === ADM_USER) return alert("Nome inválido!");
        db.usuarios[u] = { senha: "Compras@2026", saldos: {vr:0, va:0, deb:0} };
        salvarDados();
        alert("Cadastrado! Use a senha padrão.");
        abrirTela('tela-login');
    }

    function iniciarApp() {
        abrirTela('app-principal');
        document.getElementById('boas_vindas').innerText = "Oi, " + usuarioLogado;
        if (usuarioLogado !== ADM_USER) {
            const s = db.usuarios[usuarioLogado].saldos;
            document.getElementById('saldo_vr').value = s.vr;
            document.getElementById('saldo_va').value = s.va;
            document.getElementById('saldo_deb').value = s.deb;
        }
        renderizar();
    }

    function adicionarItem() {
        const n = document.getElementById('nome_prod').value;
        if(!n) return;
        db.itens.push({ n, user: usuarioLogado });
        salvarDados();
        document.getElementById('nome_prod').value = "";
        renderizar();
    }

    function renderizar() {
        const lista = document.getElementById('lista_itens');
        lista.innerHTML = "";
        db.itens.forEach((it, i) => {
            lista.innerHTML += `<div class="item-lista"><span><b>${it.n}</b> (por ${it.user})</span><button onclick="remover(${i})" style="width:auto; background:none; color:red; margin:0;">X</button></div>`;
        });
        
        if (usuarioLogado !== ADM_USER) {
            const s = db.usuarios[usuarioLogado].saldos;
            document.getElementById('res_total').innerText = (s.vr + s.va + s.deb).toFixed(2);
        }
    }

    function remover(i) { db.itens.splice(i, 1); salvarDados(); }
    function irParaAdm() { abrirTela('painel-adm'); /* Lógica de reset de senha aqui */ }
    function abrirTela(id) { document.querySelectorAll('.container > div').forEach(d => d.style.display='none'); document.getElementById(id).style.display='block'; }
    function logout() { sessionStorage.removeItem('user_ativo'); location.reload(); }
  </script>
</body>
</html>
