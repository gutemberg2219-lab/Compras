<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Compras Família - V27</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0066ff; --refeicao: #ff9800; --alimentacao: #4caf50; --debito: #9c27b0; --danger: #ff1744; --bg: #f0f2f5; --adm-bg: #37474f; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding: 15px; padding-bottom: 180px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    #tela-login, #tela-cadastro, #app-principal, #painel-adm { display: none; }
    .grid-saldos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .item-lista { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
    .resumo-fixo { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; text-align: center; }
    .alerta-preco { font-size: 11px; padding: 10px; background: #e3f2fd; border-radius: 8px; margin-bottom: 10px; display: none; border-left: 4px solid var(--primary); color: #0d47a1; }
    .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="tela-login" class="card">
        <h2 style="text-align:center; margin-bottom:15px;">🛒 Acesso</h2>
        <input type="text" id="login_user" placeholder="Usuário">
        <input type="password" id="login_pass" placeholder="Senha">
        <button style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
        <button style="background: none; color: var(--primary); border: 1px solid var(--primary);" onclick="abrirCadastro()">NOVO CADASTRO</button>
    </div>

    <div id="tela-cadastro" class="card">
        <h2 style="text-align:center; margin-bottom:15px;">📝 Criar Conta</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 10px; text-align: center;">Senha inicial: <strong>Compras@2026</strong></p>
        <input type="text" id="novo_usuario" placeholder="Nome do Usuário">
        <button style="background: #4caf50; color: white;" onclick="registrarUsuario()">CADASTRAR</button>
        <button style="background: none; color: #666;" onclick="voltarLogin()">VOLTAR</button>
    </div>

    <div id="painel-adm">
        <div class="card" style="background: var(--adm-bg); color: white;">
            <h3>🛡️ Painel Master (ADM)</h3>
            <p style="font-size: 12px; opacity: 0.8;">Gerencie as contas da família</p>
        </div>
        <div class="card">
            <h4>Usuários Cadastrados</h4>
            <div id="lista-usuarios-master" style="margin-top: 10px;"></div>
        </div>
        <button style="background: var(--primary); color: white;" onclick="acessarAppComoAdm()">IR PARA O COMPARADOR</button>
        <button style="background: #ccc; color: #333;" onclick="logout()">SAIR</button>
    </div>

    <div id="app-principal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 id="boas_vindas"></h3>
        <div style="display: flex; gap: 5px;">
            <button id="btn-voltar-adm" onclick="abrirPainelAdm()" style="display:none; width:auto; padding:5px; font-size:10px; background:var(--adm-bg); color:white;">Painel</button>
            <button onclick="logout()" style="width:auto; padding:5px; font-size:10px; background:#ccc;">Sair</button>
        </div>
      </div>

      <div class="card" style="background:#fff9c4;">
        <label>🏪 Onde você está?</label>
        <input type="text" id="mercado_atual" placeholder="Ex: Atacadão, Carrefour..." oninput="salvarTudo()">
      </div>

      <div class="card">
        <div class="grid-saldos">
          <div><label style="font-size:10px">VR</label><input type="number" id="saldo_vr" oninput="salvarTudo()"></div>
          <div><label style="font-size:10px">VA</label><input type="number" id="saldo_va" oninput="salvarTudo()"></div>
          <div><label style="font-size:10px">DÉBITO</label><input type="number" id="saldo_deb" oninput="salvarTudo()"></div>
        </div>
      </div>

      <div class="card">
          <div id="reader" style="width:100%; display:none; margin-bottom:10px; border-radius:8px; overflow:hidden;"></div>
          <button style="background:#673ab7; color:white;" onclick="alternarScanner()">📷 ESCANEAR PRODUTO</button>
          
          <div id="status_preco" class="alerta-preco"></div>
          
          <input type="text" id="codigo" placeholder="EAN (Opcional)" oninput="buscaAuto()">
          <input type="text" id="nome_prod" placeholder="O que está comprando?">
          
          <div style="display:flex; gap:5px;">
            <input type="number" id="valor_prod" placeholder="Valor R$" step="0.01" style="flex:1">
            <select id="modalbody_modalidade" style="flex:1">
                <option value="refeicao">VR</option>
                <option value="alimentacao">VA</option>
                <option value="debito">DÉBITO</option>
            </select>
          </div>
          <button style="background:#2e7d32; color:white;" onclick="adicionarItem()">➕ ADICIONAR À LISTA</button>
      </div>

      <div id="lista_itens"></div>

      <div class="card" style="background: #e8f5e9; border: 1px solid #2e7d32;">
          <button style="background: #2e7d32; color: white;" onclick="finalizarCompra()">✅ FINALIZAR COMPRA DO DIA</button>
      </div>
    </div>
  </div>

  <div class="resumo-fixo" id="barra-resumo">
    <div style="font-weight:800; font-size:16px;">RESTANTE: R$ <span id="res_total">0,00</span></div>
  </div>

  <script>
    const KEY = "COMPRAS_V25_PRO";
    let db = JSON.parse(localStorage.getItem(KEY)) || { usuarios: {}, itens: [], memo: {}, mercado: "" };
    let userAtivo = sessionStorage.getItem('sessao');
    let scanner;

    window.onload = () => {
        if (userAtivo === "adm") abrirPainelAdm();
        else if (userAtivo) iniciarApp();
        else document.getElementById('tela-login').style.display='block';
    };

    function tentarLogin() {
        const u = document.getElementById('login_user').value.trim().toLowerCase();
        const p = document.getElementById('login_pass').value;
        if (u === "adm" && p === "Melissa@2016") {
            userAtivo = "adm"; sessionStorage.setItem('sessao', "adm");
            abrirPainelAdm();
        } else if (db.usuarios[u] && db.usuarios[u].senha === p) {
            userAtivo = u; sessionStorage.setItem('sessao', u);
            iniciarApp();
        } else { alert("Usuário ou senha incorretos!"); }
    }

    function abrirPainelAdm() {
        esconderTudo();
        document.getElementById('painel-adm').style.display = 'block';
        document.getElementById('barra-resumo').style.display = 'none';
        
        const lista = document.getElementById('lista-usuarios-master');
        lista.innerHTML = "";
        
        Object.keys(db.usuarios).forEach(userKey => {
            lista.innerHTML += `
                <div class="user-row">
                    <span><strong>${db.usuarios[userKey].nome}</strong></span>
                    <button onclick="resetarSenha('${userKey}')" style="width:auto; padding:5px 10px; background:var(--danger); color:white; font-size:10px;">Resetar Senha</button>
                </div>`;
        });
        if(Object.keys(db.usuarios).length === 0) lista.innerHTML = "<p style='font-size:12px; color:#999;'>Nenhum usuário cadastrado.</p>";
    }

    function resetarSenha(userKey) {
        if(confirm(`Deseja resetar a senha de ${db.usuarios[userKey].nome} para "Compras@2026"?`)) {
            db.usuarios[userKey].senha = "Compras@2026";
            localStorage.setItem(KEY, JSON.stringify(db));
            alert("Senha resetada com sucesso!");
        }
    }

    function acessarAppComoAdm() {
        iniciarApp();
        document.getElementById('btn-voltar-adm').style.display = 'block';
    }

    function iniciarApp() {
        esconderTudo();
        document.getElementById('app-principal').style.display='block';
        document.getElementById('barra-resumo').style.display='block';
        document.getElementById('boas_vindas').innerText = "Oi, " + userAtivo;
        
        if (userAtivo !== "adm" && db.usuarios[userAtivo]) {
            const s = db.usuarios[userAtivo].saldos;
            document.getElementById('saldo_vr').value = s.vr || 0;
            document.getElementById('saldo_va').value = s.va || 0;
            document.getElementById('saldo_deb').value = s.deb || 0;
            document.getElementById('mercado_atual').value = db.mercado || "";
        }
        renderizar();
    }

    function registrarUsuario() {
        const u = document.getElementById('novo_usuario').value.trim().toLowerCase();
        if (!u || u === "adm" || db.usuarios[u]) return alert("Nome inválido ou já existe!");
        db.usuarios[u] = { nome: u, senha: "Compras@2026", saldos: { vr: 0, va: 0, deb: 0 } };
        localStorage.setItem(KEY, JSON.stringify(db));
        alert("Cadastrado! Senha padrão: Compras@2026");
        voltarLogin();
    }

    function adicionarItem() {
        const n = document.getElementById('nome_prod').value;
        const v = parseFloat(document.getElementById('valor_prod').value) || 0;
        const m = document.getElementById('modalbody_modalidade').value;
        const cod = document.getElementById('codigo').value.trim();
        if (!n || v <= 0) return;
        db.itens.push({ n, v, m, cod });
        salvarTudo();
        document.getElementById('nome_prod').value = ""; document.getElementById('valor_prod').value = "";
        document.getElementById('codigo').value = ""; document.getElementById('status_preco').style.display = "none";
    }

    function finalizarCompra() {
        if (db.itens.length === 0) return;
        if (confirm("Salvar preços no histórico?")) {
            const mercado = db.mercado || "Geral";
            db.itens.forEach(it => {
                const chave = it.cod || it.n.toLowerCase();
                if (!db.memo[chave]) db.memo[chave] = { nome: it.n, historico: [] };
                db.memo[chave].historico.push({ preco: it.v, loja: mercado, data: new Date().toLocaleDateString() });
                if (db.memo[chave].historico.length > 5) db.memo[chave].historico.shift();
            });
            db.itens = []; salvarTudo(); alert("Concluído!");
        }
    }

    function buscaAuto() {
        const chave = document.getElementById('codigo').value.trim() || document.getElementById('nome_prod').value.trim().toLowerCase();
        if(db.memo[chave]) {
            const ultimo = db.memo[chave].historico[db.memo[chave].historico.length - 1];
            document.getElementById('status_preco').style.display = "block";
            document.getElementById('status_preco').innerHTML = `📊 <b>Último:</b> R$ ${ultimo.preco.toFixed(2)} (${ultimo.loja})`;
            if(!document.getElementById('nome_prod').value) document.getElementById('nome_prod').value = db.memo[chave].nome;
        }
    }

    function renderizar() {
        const lista = document.getElementById('lista_itens');
        lista.innerHTML = ""; let total = 0;
        db.itens.forEach((it, i) => {
            total += it.v;
            lista.innerHTML += `<div class="item-lista"><span><b>${it.n}</b><br><small>R$ ${it.v.toFixed(2)} (${it.m})</small></span><button onclick="remover(${i})" style="width:auto; color:red; background:none; font-size:20px;">×</button></div>`;
        });
        if (userAtivo !== "adm" && db.usuarios[userAtivo]) {
            const s = db.usuarios[userAtivo].saldos;
            document.getElementById('res_total').innerText = ((s.vr + s.va + s.deb) - total).toFixed(2);
        }
    }

    function esconderTudo() {
        document.getElementById('tela-login').style.display='none';
        document.getElementById('tela-cadastro').style.display='none';
        document.getElementById('painel-adm').style.display='none';
        document.getElementById('app-principal').style.display='none';
    }

    function abrirCadastro() { esconderTudo(); document.getElementById('tela-cadastro').style.display='block'; }
    function voltarLogin() { esconderTudo(); document.getElementById('tela-login').style.display='block'; }
    function salvarTudo() { localStorage.setItem(KEY, JSON.stringify(db)); renderizar(); }
    function remover(i) { db.itens.splice(i, 1); salvarTudo(); }
    function logout() { sessionStorage.removeItem('sessao'); location.reload(); }
    function alternarScanner() {
        if(!scanner) {
            document.getElementById('reader').style.display='block';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('codigo').value = txt; buscaAuto();
                scanner.stop(); scanner = null; document.getElementById('reader').style.display='none';
            });
        }
    }
  </script>
</body>
</html>
