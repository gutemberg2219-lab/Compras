<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛒 Gestão Família - V75 REPAIR MASTER</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    :root {
      --primary: #0066ff;
      --purple: #673ab7;
      --success: #2e7d32;
      --danger: #ff1744;
      --dark: #1a1a1a;
      --bg: #f0f2f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: var(--bg); padding: 15px; padding-bottom: 200px; min-height: 100vh; }
    .container { max-width: 500px; margin: auto; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h2 { text-align: center; margin-bottom: 25px; font-size: 24px; }

    input, select {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 17px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
    }

    /* ==================== CORREÇÃO DO OLHO ==================== */
    .input-container {
      position: relative;
      margin-bottom: 14px;
    }

    .input-container input {
      padding-right: 55px !important;   /* espaço maior para o olho */
    }

    .btn-olho {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 26px;
      color: #666;
      cursor: pointer;
      z-index: 20;
      padding: 8px;
      line-height: 1;
    }

    button {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 17px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Tela Login -->
    <div id="tela-login" class="card">
      <h2>🛒 Login Família</h2>
      
      <input type="text" id="login_user" placeholder="Usuário" value="master">

      <div class="input-container">
        <input type="password" id="login_pass" placeholder="Senha" value="Melissa@2016">
        <button class="btn-olho" onclick="toggleSenha('login_pass')">👁️</button>
      </div>

      <button style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
      <button style="background: none; color: var(--primary); border: 2px solid var(--primary);" onclick="mostrarTela('tela-cadastro')">CRIAR NOVO ACESSO</button>
    </div>

    <!-- Tela Cadastro -->
    <div id="tela-cadastro" class="card hidden">
      <h2>📝 Novo Membro</h2>
      <input type="text" id="novo_nome" placeholder="Nome do membro">
      <button style="background: var(--success); color: white;" onclick="registrarUsuario()">CONFIRMAR CADASTRO</button>
      <button style="background: none; border: 2px solid #ccc;" onclick="mostrarTela('tela-login')">VOLTAR</button>
    </div>

    <!-- Tela Trocar Senha -->
    <div id="tela-trocar-senha" class="card hidden">
      <h2>🔒 Defina sua Senha</h2>
      <div class="input-container">
        <input type="password" id="nova_senha" placeholder="Crie sua senha">
        <button class="btn-olho" onclick="toggleSenha('nova_senha')">👁️</button>
      </div>
      <button style="background: var(--success); color: white;" onclick="salvarNovaSenha()">DEFINIR E ENTRAR</button>
    </div>

    <!-- O resto do app (scanner, lista, master, etc.) continua igual ao código anterior -->

  </div>

  <script>
    function toggleSenha(id) {
      const input = document.getElementById(id);
      input.type = (input.type === "password") ? "text" : "password";
    }

    function mostrarTela(id) {
      document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function tentarLogin() {
      alert("Login testado com olho corrigido!");
      // Coloque aqui sua lógica completa de login se quiser
    }

    // Mostrar tela de login ao carregar
    window.onload = () => mostrarTela('tela-login');
  </script>
</body>
</html>
