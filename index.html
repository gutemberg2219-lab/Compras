<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Compras do Mês - Família</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #0066ff; --refeicao: #ff9800; --alimentacao: #4caf50; --debito: #9c27b0; --danger: #ff1744; --bg: #f0f2f5; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); padding: 15px; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    /* Telas */
    #tela-login, #tela-cadastro, #tela-troca-senha, #app-principal { display: none; }
    .logo { text-align: center; font-size: 50px; margin-bottom: 10px; }
    .btn-link { background: none; color: var(--primary); font-size: 14px; text-decoration: underline; padding: 5px; }

    /* Layout App Principal (Reutilizado das versões anteriores) */
    .grid-saldos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .resumo-fixo { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
    .total-disponivel-barra { text-align: center; border-bottom: 1px solid #eee; margin-bottom: 8px; padding-bottom: 5px; font-weight: 800; }
    .colunas-resumo { display: flex; justify-content: space-around; }
    .resumo-box { text-align: center; font-size: 10px; font-weight: bold; }
    .item-lista { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 15px; background: #000; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="tela-login" class="card">
      <div class="logo">🛒</div>
      <h2 style="text-align:center; margin-bottom:20px;">Compras do Mês</h2>
      <label>Usuário (Nome)</label>
      <input type="text" id="login_user" placeholder="Digite seu nome">
      <label>Senha</label>
      <input type="password" id="login_pass" placeholder="******">
      <button class="btn-success" style="background: var(--primary); color: white;" onclick="tentarLogin()">ENTRAR</button>
      <button class="btn-link" onclick="abrirTela('tela-cadastro')">Não tem conta? Cadastrar Família</button>
    </div>

    <div id="tela-cadastro" class="card">
      <h3>Novo Cadastro</h3>
      <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Sua senha inicial será: <strong>Compras@2026</strong></p>
      <label>Nome do Usuário</label>
      <input type="text" id="cad_user" placeholder="Ex: Maria, João...">
      <button class="btn-success" style="background: #2e7d32; color: white;" onclick="realizarCadastro()">FINALIZAR CADASTRO</button>
      <button class="btn-link" onclick="abrirTela('tela-login')">Voltar ao Login</button>
    </div>

    <div id="tela-troca-senha" class="card">
      <h3 style="color: var(--danger)">Segurança: Troque sua Senha</h3>
      <p style="font-size: 12px; margin-bottom: 10px;">Você está usando a senha padrão. Escolha uma nova:</p>
      <input type="password" id="nova_senha" placeholder="Nova Senha">
      <input type="password" id="nova_senha_confirma" placeholder="Confirme a Nova Senha">
      <button class="btn-success" style="background: var(--debito); color: white;" onclick="salvarNovaSenha()">SALVAR NOVA SENHA</button>
    </div>

    <div id="app-principal">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="boas_vindas">Olá!</h2>
        <button onclick="logout()" style="width: auto; padding: 5px 10px; background: #ccc; font-size: 12px;">Sair</button>
      </div>

      <div class="card" style="background: #fff9c4;">
        <label>🏪 Supermercado Atual</label>
        <input type="text" id="mercado_atual" placeholder="Ex: Carrefour, Atacadão..." oninput="localStorage.setItem('mercado_v12', this.value)">
      </div>

      <div class="card">
        <span style="font-weight: bold; margin-bottom: 10px; display: block;">💰 Meus Saldos</span>
        <div class="grid-saldos">
          <div><label>VR</label><input type="number" id="saldo_vr" oninput="atualizarCalculos()"></div>
          <div><label>VA</label><input type="number" id="saldo_va" oninput="atualizarCalculos()"></div>
          <div><label>Débito</label><input type="number" id="saldo_deb" oninput="atualizarCalculos()"></div>
        </div>
      </div>

      <div class="card">
        <div id="reader"></div>
        <button style="background: #673ab7; color: white;" onclick="alternarScanner()">📷 ESCANEAR</button>
        <input type="text" id="nome_prod" placeholder="Nome do Produto" style="margin-top:10px;">
        <div style="display: flex; gap: 8px;">
          <input type="number" id="valor_prod" placeholder="R$ 0,00" step="0.01" style="flex:1">
          <select id="mod_prod" style="flex:1">
            <option value="refeicao">VR</option>
            <option value="alimentacao">VA</option>
            <option value="debito">DÉBITO</option>
          </select>
        </div>
        <button style="background: #2e7d32; color: white;" onclick="adicionarItem()">➕ ADICIONAR</button>
      </div>

      <div id="lista_itens"></div>
      <button style="background: var(--danger); color: white; margin-top: 20px;" onclick="limparLista()">🗑️ Limpar Lista</button>
      
      <div class="resumo-fixo">
        <div class="total-disponivel-barra">DISPONÍVEL TOTAL: R$ <span id="res_total_disp">0,00</span></div>
        <div class="colunas-resumo">
            <div class="resumo-box">VR<br><span id="res_vr">0,00</span></div>
            <div class="resumo-box">VA<br><span id="res_va">0,00</span></div>
            <div class="resumo-box">DÉB<br><span id="res_deb">0,00</span></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SENHA_PADRAO = "Compras@2026";
    let usuarioLogado = null;
    let usuarios = JSON.parse(localStorage.getItem('users_v12')) || {};
    let itens = JSON.parse(localStorage.getItem('itens_v12')) || [];

    window.onload = () => {
        const sessao = sessionStorage.getItem('user_ativo');
        if (sessao) {
            usuarioLogado = sessao;
            verificarStatusSenha();
        } else {
            abrirTela('tela-login');
        }
    };

    function abrirTela(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function realizarCadastro() {
        const user = document.getElementById('cad_user').value.trim();
        if (!user) return alert("Digite um nome!");
        if (usuarios[user]) return alert("Usuário já existe!");
        
        usuarios[user] = { senha: SENHA_PADRAO, precisaTrocar: true };
        localStorage.setItem('users_v12', JSON.stringify(usuarios));
        alert("Cadastro realizado! Use a senha padrão para o primeiro acesso.");
        abrirTela('tela-login');
    }

    function tentarLogin() {
        const user = document.getElementById('login_user').value.trim();
        const pass = document.getElementById('login_pass').value;

        if (usuarios[user] && usuarios[user].senha === pass) {
            usuarioLogado = user;
            sessionStorage.setItem('user_ativo', user);
            verificarStatusSenha();
        } else {
            alert("Usuário ou senha incorretos!");
        }
    }

    function verificarStatusSenha() {
        if (usuarios[usuarioLogado].precisaTrocar) {
            abrirTela('tela-troca-senha');
        } else {
            iniciarApp();
        }
    }

    function salvarNovaSenha() {
        const s1 = document.getElementById('nova_senha').value;
        const s2 = document.getElementById('nova_senha_confirma').value;
        if (s1.length < 4) return alert("Senha muito curta!");
        if (s1 !== s2) return alert("As senhas não coincidem!");
        if (s1 === SENHA_PADRAO) return alert("Escolha uma senha diferente da padrão!");

        usuarios[usuarioLogado].senha = s1;
        usuarios[usuarioLogado].precisaTrocar = false;
        localStorage.setItem('users_v12', JSON.stringify(usuarios));
        alert("Senha alterada com sucesso!");
        iniciarApp();
    }

    function iniciarApp() {
        abrirTela('app-principal');
        document.getElementById('boas_vindas').innerText = "Olá, " + usuarioLogado + "!";
        document.getElementById('mercado_atual').value = localStorage.getItem('mercado_v12') || "";
        renderizarLista();
    }

    function logout() {
        sessionStorage.removeItem('user_ativo');
        location.reload();
    }

    // Lógica do App (Saldos e Itens)
    function adicionarItem() {
        const nome = document.getElementById('nome_prod').value;
        const valor = parseFloat(document.getElementById('valor_prod').value) || 0;
        const mod = document.getElementById('mod_prod').value;
        if (!nome || valor <= 0) return;
        itens.push({ nome, valor, mod, user: usuarioLogado });
        localStorage.setItem('itens_v12', JSON.stringify(itens));
        document.getElementById('nome_prod').value = "";
        document.getElementById('valor_prod').value = "";
        renderizarLista();
    }

    function renderizarLista() {
        const lista = document.getElementById('lista_itens');
        lista.innerHTML = "";
        let gastos = { refeicao: 0, alimentacao: 0, debito: 0 };

        itens.forEach((it, idx) => {
            gastos[it.mod] += it.valor;
            lista.innerHTML += `<div class="item-lista" style="border-left-color: var(--${it.mod})">
                <div><b>${it.nome}</b><br><small>Por: ${it.user}</small></div>
                <div>R$ ${it.valor.toFixed(2)} <span onclick="remover(${idx})" style="color:red; margin-left:10px;">X</span></div>
            </div>`;
        });

        const s1 = parseFloat(document.getElementById('saldo_vr').value) || 0;
        const s2 = parseFloat(document.getElementById('saldo_va').value) || 0;
        const s3 = parseFloat(document.getElementById('saldo_deb').value) || 0;
        
        document.getElementById('res_vr').innerText = (s1 - gastos.refeicao).toFixed(2);
        document.getElementById('res_va').innerText = (s2 - gastos.alimentacao).toFixed(2);
        document.getElementById('res_deb').innerText = (s3 - gastos.debito).toFixed(2);
        document.getElementById('res_total_disp').innerText = ((s1+s2+s3) - (gastos.refeicao+gastos.alimentacao+gastos.debito)).toFixed(2);
    }

    function remover(i) { itens.splice(i, 1); localStorage.setItem('itens_v12', JSON.stringify(itens)); renderizarLista(); }
    function atualizarCalculos() { renderizarLista(); }
    function limparLista() { if(confirm("Limpar tudo?")) { itens = []; localStorage.setItem('itens_v12', "[]"); renderizarLista(); } }
  </script>
</body>
</html>
