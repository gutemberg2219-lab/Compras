<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛒 Gestão Família - V75 REPAIR MASTER</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    :root { --primary: #0066ff; --purple: #673ab7; --success: #2e7d32; --danger: #ff1744; --dark: #1a1a1a; --bg: #f0f2f5; }
    * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
    body { background: var(--bg); padding:15px; padding-bottom:200px; min-height:100vh; }
    .container { max-width:500px; margin:auto; }
    .card { background:white; border-radius:16px; padding:20px; margin-bottom:15px; box-shadow:0 4px 15px rgba(0,0,0,0.08); }
    input, select { width:100%; height:52px; padding:0 15px; border:2px solid #e0e0e0; border-radius:12px; margin-bottom:12px; font-size:16px; }
    input:focus, select:focus { border-color:var(--primary); }
    .btn-olho { position:absolute; right:15px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:22px; color:#777; }
    button { width:100%; height:52px; border:none; border-radius:12px; font-weight:bold; margin-bottom:10px; font-size:16px; }
    .hidden { display:none !important; }
    .balanca-detect { animation: highlight 1.5s; }
    @keyframes highlight { 0% { background:#e8f5e9; } 100% { background:white; } }
  </style>
</head>
<body>
  <div class="container">
    <!-- Tela Login -->
    <div id="tela-login" class="card">
      <h2 style="text-align:center;margin-bottom:20px;">🛒 Login Família</h2>
      <input type="text" id="login_user" placeholder="Usuário">
      <div class="input-container" style="position:relative;">
        <input type="password" id="login_pass" placeholder="Senha">
        <button class="btn-olho" onclick="toggleSenha('login_pass')">👁️</button>
      </div>
      <button style="background:var(--primary);color:white;" onclick="tentarLogin()">ENTRAR</button>
      <button style="background:none;color:var(--primary);border:2px solid var(--primary);" onclick="mostrarTela('tela-cadastro')">CRIAR NOVO ACESSO</button>
    </div>

    <!-- Outras telas (cadastro, trocar senha) foram omitidas por brevidade, mas mantenha-as se já tiver -->

    <!-- App Principal -->
    <div id="app-principal" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h3 id="boas_vindas">Oi, Usuário</h3>
        <button id="btn-master" onclick="abrirMaster()" style="display:none;background:var(--dark);color:#ffd700;padding:8px 12px;">🛡️ MASTER</button>
        <button onclick="logout()" style="background:#ccc;padding:8px 12px;">SAIR</button>
      </div>

      <div class="card">
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <button style="background:var(--purple);color:white;flex:1;" onclick="alternarScanner()">📷 ESCANEAR EAN / BALANÇA</button>
          <button style="background:#e3f2fd;color:var(--primary);flex:1;" onclick="document.getElementById('camera-input').click()">📸 FOTO</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="processarFoto(event)">
        
        <div id="reader" class="hidden"></div>

        <input type="text" id="codigo" placeholder="Código (EAN ou Balança)" oninput="processarCodigoBalanca()">
        <input type="text" id="nome_prod" placeholder="Nome do produto">
        <div style="display:flex;gap:10px;">
          <input type="number" id="qtd_prod" value="1" min="1" style="flex:1;">
          <input type="number" id="valor_prod" placeholder="R$ unitário" step="0.01" style="flex:2;">
        </div>
        <select id="metodo_pagto">
          <option value="saldo">Abater do Saldo</option>
          <option value="extra">Extra (Cartão/Dinheiro)</option>
        </select>
        <button style="background:var(--success);color:white;" onclick="adicionarItem()">➕ ADICIONAR ITEM</button>
      </div>

      <div id="lista_itens"></div>
      <button style="background:var(--primary);color:white;" onclick="finalizarCompra()">✅ FINALIZAR COMPRA</button>
    </div>
  </div>

  <script>
    // ==================== CONFIGURAÇÃO ====================
    const DB_NAME = "FAMILIA_DB_V75";
    let db = JSON.parse(localStorage.getItem(DB_NAME)) || { usuarios: {}, saldoGlobal: 0, bancoPrecos: {}, historicoCompras: [] };
    let userAtivo = sessionStorage.getItem('sessao_user');
    let scanner = null;

    function salvarBD() { localStorage.setItem(DB_NAME, JSON.stringify(db)); }

    function mostrarTela(id) {
      document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
      const tela = document.getElementById(id);
      if (tela) tela.classList.remove('hidden');
    }

    function toggleSenha(id) {
      const el = document.getElementById(id);
      el.type = el.type === "password" ? "text" : "password";
    }

    // ==================== PROCESSAMENTO DE CÓDIGO BALANÇA ====================
    function processarCodigoBalanca() {
      const cod = document.getElementById('codigo').value.trim();
      if (!cod || cod.length < 12 || !cod.startsWith('2')) return;

      // Destaque visual
      const card = document.querySelector('#app-principal > .card');
      if (card) card.classList.add('balanca-detect');
      setTimeout(() => card && card.classList.remove('balanca-detect'), 1800);

      // Tentativa de extrair preço (formato comum: preço nos últimos 5 dígitos)
      let preco = null;
      if (cod.length >= 13) {
        const ultimaParte = cod.substring(cod.length - 5);
        preco = parseFloat(ultimaParte) / 100;
      }

      if (preco && preco > 0) {
        document.getElementById('nome_prod').value = "Produto Balança";
        document.getElementById('valor_prod').value = preco.toFixed(2);
        alert(`✅ Código de balança detectado!\nPreço extraído: R$ ${preco.toFixed(2)}`);
      } else {
        alert(`✅ Código de balança detectado (inicia com 2)\n\nEdite o nome e informe o valor manualmente.`);
      }
    }

    async function alternarScanner() {
      const reader = document.getElementById('reader');
      if (scanner) {
        await scanner.stop().catch(()=>{});
        scanner = null;
        reader.classList.add('hidden');
        return;
      }

      reader.classList.remove('hidden');
      scanner = new Html5Qrcode("reader");

      try {
        await scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          (decodedText) => {
            document.getElementById('codigo').value = decodedText;
            processarCodigoBalanca();
            scanner.stop().catch(()=>{});
            reader.classList.add('hidden');
            scanner = null;
          }
        );
      } catch (err) {
        alert("Não foi possível acessar a câmera.\n" + err.message);
        reader.classList.add('hidden');
      }
    }

    function adicionarItem() {
      const nome = document.getElementById('nome_prod').value.trim();
      const valor = parseFloat(document.getElementById('valor_prod').value);
      if (!nome || !valor) return alert("Preencha nome e valor!");

      // Adiciona na lista (simplificado)
      alert(`Item adicionado: ${nome} - R$ ${valor}`);
      // Aqui você pode expandir para salvar na lista real
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    // Inicialização segura
    window.onload = function() {
      if (userAtivo) {
        mostrarTela('app-principal');
      } else {
        mostrarTela('tela-login');
      }
    };
  </script>
</body>
</html>
