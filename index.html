<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Lista de Compras</title>
  <style>
    :root { --primary: #0066ff; --success: #00c853; --danger: #ff1744; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    .container { max-width: 620px; margin: 0 auto; }
    h1 { font-size: 28px; text-align: center; margin-bottom: 25px; color: #1a1a1a; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 10px;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,255,0.15);
      outline: none;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    #status {
      min-height: 90px;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      font-size: 15px;
      line-height: 1.5;
    }
    .item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total {
      font-size: 26px;
      font-weight: bold;
      text-align: center;
      color: var(--success);
      margin: 25px 0;
      padding: 18px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 Lista de Compras</h1>

    <div class="card">
      <input type="text" id="codigo" placeholder="Código de barras (opcional)">
      <button class="btn-primary" onclick="tentarBuscar()">🔍 Tentar Buscar Automaticamente</button>

      <div id="status" style="background:#fff3cd; border: 2px solid #ffc107;">
        A busca automática nem sempre encontra produtos brasileiros.<br>
        <strong>Recomendação:</strong> Digite o nome do produto manualmente (mais rápido no supermercado).
      </div>

      <input type="text" id="nome" placeholder="Nome completo do produto (ex: Álcool Gel 70° 450ml)" />
      <input type="number" id="valor" step="0.01" placeholder="Valor pago (R$)" />
      <input type="number" id="quantidade" value="1" placeholder="Quantidade" />

      <button class="btn-success" onclick="adicionarItem()">➕ Adicionar à Lista</button>
    </div>

    <h2 style="margin: 15px 0 10px 5px;">Itens na lista</h2>
    <div id="lista"></div>

    <div class="total">
      Total: R$ <span id="total">0.00</span>
    </div>

    <button class="btn-danger" onclick="limparLista()">🗑️ Limpar Lista</button>
  </div>

  <script>
    let itens = [];

    async function tentarBuscar() {
      const codigo = document.getElementById('codigo').value.trim();
      const status = document.getElementById('status');

      if (!codigo) {
        status.innerHTML = "Digite o código de barras primeiro!";
        return;
      }

      status.innerHTML = "🔄 Tentando buscar...";
      status.style.background = "#e3f2fd";

      let nomeEncontrado = "";

      // Tentativa com Open Food Facts
      try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${codigo}.json`);
        const data = await res.json();
        if (data.status === 1 && data.product) {
          nomeEncontrado = data.product.product_name || data.product.generic_name;
        }
      } catch (e) {}

      // Tentativa com EAN Pictures (Brasil)
      if (!nomeEncontrado) {
        try {
          const res = await fetch(`http://www.eanpictures.com.br:9000/api/gtin/${codigo}`);
          if (res.ok) {
            const data = await res.json();
            nomeEncontrado = data.name || data.description;
          }
        } catch (e) {}
      }

      if (nomeEncontrado) {
        status.innerHTML = `✅ Encontrado: <strong>${nomeEncontrado}</strong>`;
        status.style.background = "#e8f5e9";
        document.getElementById('nome').value = nomeEncontrado;
      } else {
        status.innerHTML = `❌ Não encontrado automaticamente.<br>
                            <strong>Digite o nome do produto abaixo.</strong>`;
        status.style.background = "#fff3cd";
        document.getElementById('nome').focus();
      }
    }

    function adicionarItem() {
      const nome = document.getElementById('nome').value.trim();
      const valor = parseFloat(document.getElementById('valor').value) || 0;
      const qtd = parseFloat(document.getElementById('quantidade').value) || 1;

      if (!nome) {
        alert("Por favor, digite o nome do produto!");
        return;
      }
      if (valor <= 0) {
        alert("Informe o valor pago!");
        return;
      }

      itens.push({ nome, valor, qtd, subtotal: valor * qtd });
      renderizarLista();

      // Limpar para próximo item
      document.getElementById('codigo').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('status').innerHTML = "Pronto para o próximo produto...";
      document.getElementById('status').style.background = "#f8f9fa";
    }

    function renderizarLista() {
      const container = document.getElementById('lista');
      container.innerHTML = '';
      let total = 0;

      itens.forEach((item, index) => {
        total += item.subtotal;
        container.innerHTML += `
          <div class="item">
            <div>
              <strong>${item.nome}</strong><br>
              ×${item.qtd} • R$ ${item.valor.toFixed(2)}
            </div>
            <div style="text-align:right;">
              <strong>R$ ${item.subtotal.toFixed(2)}</strong><br>
              <button onclick="removerItem(${index})" style="margin-top:6px; background:#ff1744; color:white; border:none; padding:6px 12px; border-radius:8px; font-size:13px;">
                Remover
              </button>
            </div>
          </div>`;
      });

      document.getElementById('total').textContent = total.toFixed(2);
    }

    function removerItem(index) {
      itens.splice(index, 1);
      renderizarLista();
    }

    function limparLista() {
      if (confirm("Limpar toda a lista?")) {
        itens = [];
        renderizarLista();
      }
    }
  </script>
</body>
</html>
