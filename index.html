<div class="card" style="background: #eee;">
    <p style="font-size: 11px; margin-bottom: 5px;">🔄 Sincronizar entre aparelhos:</p>
    <div style="display: flex; gap: 5px;">
        <button style="font-size: 10px; padding: 5px; background: #555; color: white;" onclick="exportarDados()">Gerar Backup</button>
        <button style="font-size: 10px; padding: 5px; background: #555; color: white;" onclick="importarDados()">Colar Backup</button>
    </div>
</div>

<script>
// Novas funções para transferir dados entre celular e PC
function exportarDados() {
    const backup = localStorage.getItem("SISTEMA_V22_FINAL");
    prompt("Copie este código e cole no outro aparelho:", backup);
}

function importarDados() {
    const codigo = prompt("Cole aqui o código de backup do outro aparelho:");
    if (codigo) {
        localStorage.setItem("SISTEMA_V22_FINAL", codigo);
        alert("Dados sincronizados! A página irá recarregar.");
        location.reload();
    }
}
</script>
